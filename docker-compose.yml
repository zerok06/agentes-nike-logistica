# ==============================================================
# docker-compose.yml — Nike Logística Platform
# Arquitectura Multi-DB: 4 PostgreSQL independientes + Redis
#
# ┌─────────────────────────────────────────────────────────┐
# │  DB 1: nike_logistica_db     → puerto 5432 (CENTRAL)   │
# │  DB 2: nike_sede_peru_db     → puerto 5433 (SEDE PERU)  │
# │  DB 3: nike_retail_db        → puerto 5434 (RETAIL)     │
# │  DB 4: nike_supply_chain_db  → puerto 5435 (SUPPLY)     │
# │  Redis                       → puerto 6379 (CACHE)      │
# │  pgAdmin (--profile tools)   → puerto 5050              │
# └─────────────────────────────────────────────────────────┘
#
# Uso:
#   docker compose up -d                          # Las 4 DBs + Redis
#   docker compose --profile tools up -d          # Incluye pgAdmin
#   docker compose logs -f                        # Ver todos los logs
#   docker compose logs postgres_central -f       # Ver init de DB central
#   docker compose down -v                        # Reset total (borra datos)
# ==============================================================

services:

  # ============================================================
  # DB 1 — CENTRAL (Plataforma SaaS Multi-Tenant)
  # Schema: nike_logistica
  # Tablas: 24 (users, products, inventory, agents, etc.)
  # Imagen: pgvector/pgvector:pg16 — necesita extensión vector
  # Puerto host: 5432
  # ============================================================
  postgres_central:
    image: pgvector/pgvector:pg16
    container_name: nike_db_central
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_CENTRAL_USER}
      POSTGRES_PASSWORD: ${DB_CENTRAL_PASSWORD}
      POSTGRES_DB:       ${DB_CENTRAL_NAME}
    volumes:
      - postgres_central_data:/var/lib/postgresql/data
      # El SQL se monta directo — Docker lo ejecuta al primer arranque
      - ./db/01_platform_central.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${DB_CENTRAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_CENTRAL_USER} -d ${DB_CENTRAL_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - nike_network

  # ============================================================
  # DB 2 — SEDE PERU (Operaciones Logísticas Nike Perú)
  # Schema: nike_sede_peru
  # Tablas: 14 (warehouses GPS, inventory, shipments, routes...)
  # Imagen: postgres:16-alpine — sin pgvector (no usa embeddings)
  # Puerto host: 5433
  # ============================================================
  postgres_sede_peru:
    image: postgres:16-alpine
    container_name: nike_db_sede_peru
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_SEDE_USER}
      POSTGRES_PASSWORD: ${DB_SEDE_PASSWORD}
      POSTGRES_DB:       ${DB_SEDE_NAME}
    volumes:
      - postgres_sede_data:/var/lib/postgresql/data
      - ./db/02_sede_nike_peru.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${DB_SEDE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SEDE_USER} -d ${DB_SEDE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nike_network

  # ============================================================
  # DB 3 — RETAIL (Distribuidoras y Minoristas)
  # Schema: nike_retail
  # Tablas: 5 (retailers, regions, categories, retail_sales)
  # Datos reales: Nike Dataset.csv (2020-2021, ~110 registros)
  # Puerto host: 5434
  # ============================================================
  postgres_retail:
    image: postgres:16-alpine
    container_name: nike_db_retail
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_RETAIL_USER}
      POSTGRES_PASSWORD: ${DB_RETAIL_PASSWORD}
      POSTGRES_DB:       ${DB_RETAIL_NAME}
    volumes:
      - postgres_retail_data:/var/lib/postgresql/data
      - ./db/03_retail_distribuidoras.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${DB_RETAIL_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RETAIL_USER} -d ${DB_RETAIL_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nike_network

  # ============================================================
  # DB 4 — SUPPLY CHAIN (Fábricas y Proveedores Globales)
  # Schema: nike_supply_chain
  # Tablas: 2 (supplier_groups, factories) + 3 vistas
  # Datos reales: imap_export.csv (50 fábricas reales Nike)
  # Puerto host: 5435
  # ============================================================
  postgres_supply_chain:
    image: postgres:16-alpine
    container_name: nike_db_supply_chain
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_SUPPLY_USER}
      POSTGRES_PASSWORD: ${DB_SUPPLY_PASSWORD}
      POSTGRES_DB:       ${DB_SUPPLY_NAME}
    volumes:
      - postgres_supply_data:/var/lib/postgresql/data
      - ./db/04_proveedores_fabricas.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${DB_SUPPLY_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPPLY_USER} -d ${DB_SUPPLY_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nike_network

  # ============================================================
  # REDIS — Caché Semántica del Chatbot
  # TTL y LRU para respuestas de Groq (threshold coseno >0.95)
  # Puerto host: 6379
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: nike_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nike_network

  # ============================================================
  # pgADMIN — Panel Visual (OPCIONAL)
  # Solo se levanta con: docker compose --profile tools up -d
  # Acceso: http://localhost:5050
  #
  # Agregar servidores manualmente en pgAdmin:
  # ============================================================
  # BACKEND — API FastAPI
  # ============================================================
  backend:
    build:
      context: ./backend
    container_name: nike_backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_PORT=8000
      - APP_HOST=0.0.0.0
      - SECRET_KEY=${SECRET_KEY}
      - DEMO_MODE=${DEMO_MODE:-True}
      - DEMO_ROLE_HEADER=${DEMO_ROLE_HEADER:-X-Demo-Role}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - DATABASE_URL_CENTRAL=postgresql+asyncpg://${DB_CENTRAL_USER}:${DB_CENTRAL_PASSWORD}@postgres_central:5432/${DB_CENTRAL_NAME}
      - DATABASE_URL_SEDE=postgresql+asyncpg://${DB_SEDE_USER}:${DB_SEDE_PASSWORD}@postgres_sede_peru:5432/${DB_SEDE_NAME}
      - DATABASE_URL_RETAIL=postgresql+asyncpg://${DB_RETAIL_USER}:${DB_RETAIL_PASSWORD}@postgres_retail:5432/${DB_RETAIL_NAME}
      - DATABASE_URL_SUPPLY=postgresql+asyncpg://${DB_SUPPLY_USER}:${DB_SUPPLY_PASSWORD}@postgres_supply_chain:5432/${DB_SUPPLY_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - GROQ_MAX_TOKENS=${GROQ_MAX_TOKENS:-2048}
      - GROQ_TEMPERATURE=${GROQ_TEMPERATURE:-0.3}
      - HF_TOKEN=${HF_TOKEN}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-384}
      - VECTOR_SIMILARITY_THRESHOLD=${VECTOR_SIMILARITY_THRESHOLD:-0.95}
    volumes:
      - ./backend/app:/workspace/app
    depends_on:
      postgres_central:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nike_network

  # ============================================================
  # FRONTEND — React + Vite
  # ============================================================
  frontend:
    build:
      context: ./frontend
    container_name: nike_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    networks:
      - nike_network

  # ============================================================
  # pgADMIN — Panel Visual (OPCIONAL)
  # Solo se levanta con: docker compose --profile tools up -d
  # Acceso: http://localhost:5050
  #
  # Agregar servidores manualmente en pgAdmin:
  #   Central:    Host=postgres_central      Port=5432
  #   Sede Peru:  Host=postgres_sede_peru    Port=5432
  #   Retail:     Host=postgres_retail       Port=5432
  #   Supply:     Host=postgres_supply_chain Port=5432
  # (Usar los nombres de contenedor como host dentro de la red)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nike_pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL:              ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:           ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:         "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres_central:
        condition: service_healthy
      postgres_sede_peru:
        condition: service_healthy
      postgres_retail:
        condition: service_healthy
      postgres_supply_chain:
        condition: service_healthy
    networks:
      - nike_network

# ==============================================================
# VOLÚMENES
# ==============================================================
volumes:
  postgres_central_data:
    name: nike_postgres_central
  postgres_sede_data:
    name: nike_postgres_sede_peru
  postgres_retail_data:
    name: nike_postgres_retail
  postgres_supply_data:
    name: nike_postgres_supply_chain
  redis_data:
    name: nike_redis_data
  pgadmin_data:
    name: nike_pgadmin_data

# ==============================================================
# RED — Todos los contenedores se comunican por nombre
# Desde el backend FastAPI (si se agrega a esta red):
#   central    → postgresql://...@postgres_central:5432/...
#   sede peru  → postgresql://...@postgres_sede_peru:5432/...
#   retail     → postgresql://...@postgres_retail:5432/...
#   supply     → postgresql://...@postgres_supply_chain:5432/...
#   redis      → redis://:password@redis:6379/0
# ==============================================================
networks:
  nike_network:
    name: nike_logistica_network
    driver: bridge
